name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_channel:
        description: 'TX3 channel to test'
        required: false
        default: 'stable'
        type: choice
        options:
        - stable
        - nightly
        - beta
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-tests:
    name: E2E (${{ matrix.runner }}, ${{ matrix.test }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
        test:
          - fresh_install
          - update_install

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2

    - name: Build tx3up
      run: cargo build --release

    - name: Install jq
      run: |
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update && sudo apt-get install -y jq
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          command -v jq >/dev/null 2>&1 || brew install jq
        fi

    - name: Run E2E test - ${{ matrix.test }}
      env:
        TX3_CHANNEL: ${{ inputs.test_channel || 'stable' }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./tests/e2e/${{ matrix.test }}.sh

    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.runner }}-${{ matrix.test }}
        path: |
          /tmp/tmp.*/tx3_test/
          target/release/tx3up
        retention-days: 7
        if-no-files-found: ignore
